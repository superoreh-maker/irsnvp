<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GURS GIS Pregledovalnik v4.8 - Končna verzija</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Glavni Meni */
        .main-menu {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 300px; transition: 0.3s; overflow: hidden;
        }
        .main-menu.collapsed { width: 45px; height: 45px; border-radius: 50%; }
        .main-menu.collapsed .menu-content { display: none; }
        .menu-header { display: flex; align-items: center; padding: 5px 10px; background: #f8f9fa; border-bottom: 1px solid #eee; cursor: pointer; height: 45px; }
        #toggle-menu-btn { background: none; border: none; font-size: 24px; color: #2c3e50; cursor: pointer; }
        
        .menu-content { padding: 15px; }
        .search-row { display: flex; margin-bottom: 12px; gap: 5px; }
        #search-input { flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 6px; outline: none; font-size: 13px; }
        #search-btn { background: #2c3e50; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; }

        .row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; cursor: pointer; }
        .row input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }

        /* Stil za številke parcel na zemljevidu */
        .parcel-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-size: 11px; font-weight: 900;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            pointer-events: none !important; 
        }

        /* Info Okno (Bottom Sheet) */
        #info-okno {
            position: absolute; bottom: -600px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 400px; background: white; border-radius: 15px 15px 0 0;
            box-shadow: 0px -5px 25px rgba(0,0,0,0.4); z-index: 2000; padding: 15px;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 5px solid #e67e22;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; margin-bottom: 10px; }
        .mini-podatek { border-bottom: 1px solid #f0f0f0; padding-bottom: 2px; }
        .mini-label { color: #999; font-size: 9px; text-transform: uppercase; font-weight: bold; }
        .mini-val { color: #222; font-size: 12px; font-weight: 600; display: block; }
        
        .btn-action { width: 100%; padding: 8px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; margin-top: 4px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<div id="main-menu" class="main-menu collapsed">
    <div class="menu-header" onclick="toggleMenu()">
        <button id="toggle-menu-btn">☰</button>
        <span style="font-size:14px; font-weight:bold; margin-left:10px;">IRSNVP GIS v4.8</span>
    </div>
    <div class="menu-content">
        <div class="search-row">
            <input type="text" id="search-input" placeholder="Naslov ali npr. 1739 2207/6..." onkeypress="if(event.key==='Enter') isciNaslov()">
            <button id="search-btn" onclick="isciNaslov()">🔍</button>
        </div>
        <label class="row"><input type="checkbox" id="check-parcele" checked onchange="naloziParcele()"> 📐 Zemljiške parcele</label>
        <label class="row"><input type="checkbox" id="check-labels" checked onchange="toggleLabels()"> 🛣️ Imena ulic</label>
        <label class="row"><input type="checkbox" id="check-lokacija" checked onchange="toggleGeolokacija()"> 📍 Moja lokacija</label>            
        <label class="row"><input type="checkbox" id="check-mojetocke" checked onchange="toggleMojeTocke()"> 📌 Moje točke</label>
    </div>
</div>

<div id="map"></div>

<div id="info-okno">
    <span style="float:right; cursor:pointer; font-weight:bold; color:#999;" onclick="zapriInfoOkno()">[X]</span>
    <h3 id="info-naslov" style="margin:0 0 10px 0; font-size: 16px; color:#e67e22;">Podatki</h3>
    <div id="info-vsebina">Izberite parcelo na zemljevidu...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- INICIALIZACIJA ---
    const urlParams = new URLSearchParams(window.location.search);
    const startLat = parseFloat(urlParams.get('lat')) || 46.05;
    const startLng = parseFloat(urlParams.get('lng')) || 14.5;
    const startZoom = parseInt(urlParams.get('zoom')) || 13;

    const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([startLat, startLng], startZoom);
    
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { zIndex: 1000 }).addTo(map);

    let parceleLayer = L.layerGroup().addTo(map);
    let mojeTockeLayer = L.layerGroup().addTo(map);
    let userMarker = null;
    let fetchAbortController = null;

    // --- OSNOVNE FUNKCIJE ---
    function toggleMenu() { document.getElementById('main-menu').classList.toggle('collapsed'); }
    function zapriInfoOkno() { document.getElementById("info-okno").style.bottom = "-600px"; }
    function toggleLabels() { document.getElementById('check-labels').checked ? labels.addTo(map) : map.removeLayer(labels); }

    // --- PAMETNO ISKANJE (PARCELA ALI NASLOV) ---
    async function isciNaslov() {
        const vnos = document.getElementById('search-input').value.trim();
        if (!vnos) return;

        // Regex za format "ŠifraKO Parcela" (npr 1739 2207/6)
        const parcelMatch = vnos.match(/^(\d+)\s+([0-9/]+)$/);
        
        if (parcelMatch) {
            const ko = parcelMatch[1];
            const parc = parcelMatch[2];
            try {
                const url = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&srsName=EPSG:4326&cql_filter=KO_SIFRA=${ko} AND ST_PARCELE='${parc}'`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.features && data.features.length > 0) {
                    const coords = data.features[0].geometry.coordinates[0][0][0]; // Prva točka
                    const latlng = { lat: coords[1], lng: coords[0] };
                    map.setView([latlng.lat, latlng.lng], 19);
                    fetchGursData(latlng, parc, data.features[0].properties.EID);
                } else {
                    alert("Parcele s temi podatki nismo našli.");
                }
            } catch (e) { alert("Napaka pri iskanju parcele."); }
        } else {
            // Iskanje po naslovu (Nominatim)
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(vnos)}&countrycodes=si`)
                .then(r => r.json())
                .then(data => {
                    if (data.length > 0) map.setView([data[0].lat, data[0].lon], 18);
                    else alert("Naslova ni mogoče najti.");
                });
        }
    }

    // --- PRIDOBIVANJE GURS PODATKOV ---
    async function fetchGursData(latlng, stParcele, eid) {
        const infoNaslov = document.getElementById("info-naslov");
        const infoVsebina = document.getElementById("info-vsebina");
        
        infoNaslov.innerText = "Nalaganje... " + stParcele;
        infoVsebina.innerHTML = "Povezujem se z registri... ⏳";
        document.getElementById("info-okno").style.bottom = "0";

        const buffer = 0.0001; 
        const bbox = `${latlng.lng-buffer},${latlng.lat-buffer},${latlng.lng+buffer},${latlng.lat+buffer},EPSG:4326`;
        const rpeBase = `https://ipi.eprostor.gov.si/wfs-si-gurs-rpe/wfs?service=WFS&version=1.1.0&request=GetFeature&outputFormat=application/json&srsName=EPSG:4326&bbox=${bbox}`;
        const knBase = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn-osnovni/wfs?service=WFS&version=1.1.0&request=GetFeature&outputFormat=application/json&srsName=EPSG:4326&bbox=${bbox}`;

        try {
            const responses = await Promise.allSettled([
                fetch(knBase + "&typeName=KATASTRSKE_OBCINE_TABELA").then(r => r.json()),
                fetch(rpeBase + "&typeName=SI.GURS.RPE:OBCINE").then(r => r.json()),
                fetch(rpeBase + "&typeName=SI.GURS.RPE:UPRAVNE_ENOTE").then(r => r.json()),
                fetch(rpeBase + "&typeName=SI.GURS.RPE:NASELJA").then(r => r.json()),
                fetch(rpeBase + "&typeName=SI.GURS.RPE:POSTNI_OKOLISI").then(r => r.json())
            ]);

            const getVal = (idx, isPosta = false) => {
                if (responses[idx].status === "fulfilled" && responses[idx].value.features?.length > 0) {
                    const p = responses[idx].value.features[0].properties;
                    if (isPosta) return `${p.SIFRA || p.POSTNA_STEVILKA || ''} ${p.IME || p.IME_POSTE || ''}`.trim();
                    return p.UIME || p.NAZIV || p.NAZIV_KO || p.IME || "-";
                }
                return "-";
            };

            const koSifra = responses[0].status === "fulfilled" ? (responses[0].value.features[0]?.properties.SIFRA || "----") : "----";
            infoNaslov.innerText = `${koSifra} ${stParcele}`;

            infoVsebina.innerHTML = `
                <div class="info-grid">
                    <div class="mini-podatek"><span class="mini-label">K. občina</span><span class="mini-val">${getVal(0)}</span></div>
                    <div class="mini-podatek"><span class="mini-label">Občina</span><span class="mini-val">${getVal(1)}</span></div>
                    <div class="mini-podatek"><span class="mini-label">UE</span><span class="mini-val">${getVal(2)}</span></div>
                    <div class="mini-podatek"><span class="mini-label">Naselje</span><span class="mini-val">${getVal(3)}</span></div>
                    <div class="mini-podatek" style="grid-column: span 2;"><span class="mini-label">Pošta</span><span class="mini-val">${getVal(4, true)}</span></div>
                </div>
                <button class="btn-action" style="background:#c0392b" onclick="odpriZK('${koSifra}', '${stParcele}')">📄 ZK IZPISEK (PDF)</button>
                <div style="display:flex; gap:5px;">
                    <button class="btn-action" style="background:#2980b9" onclick="odpriGURS('${koSifra}','${stParcele}','${eid}',${latlng.lat},${latlng.lng},'JV')">🌍 GURS JV</button>
                    <button class="btn-action" style="background:#e67e22" onclick="odpriGURS('${koSifra}','${stParcele}','${eid}',${latlng.lat},${latlng.lng},'RV')">💰 GURS RV</button>
                </div>
            `;
        } catch (e) { infoVsebina.innerHTML = "Napaka pri povezavi s strežniki."; }
    }

    // --- ZK IN GURS POVEZAVE ---
    function odpriZK(ko, parc) {
        const f = document.createElement('form'); f.method = 'POST'; f.target = '_blank';
        f.action = 'https://evlozisce.sodisce.si/evlozisce/javni_izpisi/03-001.html';
        const p = { 'nacinList': 'IDZNAK', 'idZnakNep.katastrskaObcina.idsrcsifrant': ko, 'idZnakNep.parcelnaStevilkaNovo': parc.split(' ').pop(), '_eventId_pdf': 'Prikaži v pdf' };
        for (let k in p) { const i = document.createElement('input'); i.type = 'hidden'; i.name = k; i.value = p[k]; f.appendChild(i); }
        document.body.appendChild(f); f.submit(); f.remove();
    }

    async function odpriGURS(ko, parc, eid, lat, lng, type) {
        const baseUrl = type === 'RV' ? 'https://ipi.eprostor.gov.si/rv/' : 'https://ipi.eprostor.gov.si/jv/';
        if (eid && eid !== 'undefined') { window.open(`${baseUrl}?eid=${eid}`, '_blank'); return; }
        alert("EID ni na voljo. Poskusite klikniti točno na sredino parcele.");
    }

    // --- OSVEŽEVANJE PARCEL NA ZEMLJEVIDU ---
    function naloziParcele() {
        if (!document.getElementById('check-parcele').checked || map.getZoom() < 17) {
            parceleLayer.clearLayers(); return;
        }
        if (fetchAbortController) fetchAbortController.abort();
        fetchAbortController = new AbortController();

        const b = map.getBounds();
        const url = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&srsName=EPSG:4326&bbox=${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()},EPSG:4326`;

        fetch(url, { signal: fetchAbortController.signal })
            .then(r => r.json())
            .then(data => {
                parceleLayer.clearLayers();
                L.geoJSON(data, {
                    style: { color: "white", weight: 1.2, fillOpacity: 0 },
                    onEachFeature: (f, l) => {
                        const st = f.properties.ST_PARCELE || f.properties.st_parcele;
                        l.bindTooltip(String(st), { permanent: true, className: 'parcel-tooltip', direction: 'center' });
                        l.on('click', (e) => { 
                            L.DomEvent.stopPropagation(e);
                            fetchGursData(e.latlng, st, f.properties.EID || f.properties.OST_EID); 
                        });
                    }
                }).addTo(parceleLayer);
            }).catch(e => {});
    }

    // --- MOJE TOČKE (GOOGLE SHEETS) ---
    function naloziMojeTocke() {
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQGHIoNVspAhEHLg6i8jt7iXdY1dxiEOWkU1VMiUkkWAlOf42eTGR0KQmKDv16XG8nNOMNyrw_VkHwU/pub?gid=929707322&single=true&output=csv";
        Papa.parse(csvUrl, {
            download: true, header: true, complete: (res) => {
                mojeTockeLayer.clearLayers();
                res.data.forEach(row => {
                    const k = row['Koordinate Google maps'] || "";
                    if (k.includes(',')) {
                        const [la, ln] = k.split(',').map(parseFloat);
                        if (!isNaN(la)) {
                            L.marker([la, ln]).addTo(mojeTockeLayer).bindPopup(`<b>${row['Naziv'] || 'Brez naziva'}</b><br>${row['Postopek'] || ''}`);
                        }
                    }
                });
            }
        });
    }

    function toggleMojeTocke() { document.getElementById('check-mojetocke').checked ? naloziMojeTocke() : mojeTockeLayer.clearLayers(); }

    function toggleGeolokacija() {
        if (document.getElementById('check-lokacija').checked) {
            map.locate({setView: true, maxZoom: 18});
            map.on('locationfound', e => {
                if (userMarker) userMarker.setLatLng(e.latlng);
                else userMarker = L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: '#3498db', fillOpacity: 1}).addTo(map);
            });
        } else { if(userMarker) map.removeLayer(userMarker); userMarker = null; }
    }

    // --- DOGODKI ---
    map.on('moveend', naloziParcele);
    naloziMojeTocke();
    if (!urlParams.get('lat')) toggleGeolokacija();

</script>
</body>
</html>
