
<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PIS Iskalnik Aktov po Parcelah</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #f4f6f8; display: flex; flex-direction: row;}
        
        /* Levi panel za iskanje in rezultate */
        #sidebar { width: 420px; min-width: 420px; height: 100%; background: #ffffff; box-shadow: 2px 0 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Glava iskalnika */
        .search-header { background: #2c3e50; color: white; padding: 20px; }
        .search-header h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-field { flex: 1; }
        .input-field label { display: block; font-size: 11px; font-weight: bold; color: #bdc3c7; text-transform: uppercase; margin-bottom: 5px; }
        .input-field input { width: 100%; padding: 10px; border: 1px solid #34495e; border-radius: 6px; font-size: 15px; box-sizing: border-box; background: #fdfdfd; outline: none; transition: border 0.2s;}
        .input-field input:focus { border-color: #3498db; }
        
        .btn-search { width: 100%; background: #3498db; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .btn-search:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-search:active { transform: translateY(1px); }

        /* Kontejner za rezultate */
        #results-container { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        
        /* Statusni izpisi */
        .status-msg { padding: 15px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 15px; text-align: center; }
        .status-loading { background: #e8f4fd; color: #2980b9; border: 1px solid #bde0fe; }
        .status-error { background: #fdf0ed; color: #c0392b; border: 1px solid #fadbd8; }
        .status-success { background: #eafaf1; color: #27ae60; border: 1px solid #d4efdf; }

        /* Kartice aktov */
        .gd-card { background: white; border: 1px solid #e0e0e0; border-left: 5px solid #f39c12; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .gd-card.has-pzg { border-left-color: #27ae60; background: #fafdfb; }
        .gd-card-title { margin: 0 0 12px 0; color: #d35400; font-size: 16px; font-weight: 800; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .gd-card.has-pzg .gd-card-title { color: #27ae60; }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { border-bottom: 1px solid #f5f5f5; padding: 6px 0; vertical-align: top; }
        .data-table th { color: #7f8c8d; font-weight: 600; width: 40%; text-align: left; padding-right: 10px;}
        .data-table td { color: #2c3e50; font-weight: 700; }

        .btn-link { display: block; background: #16a085; color: white; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 13px; margin-top: 15px; transition: 0.2s;}
        .btn-link:hover { background: #117a65; }

        /* Območje zemljevida */
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        .parcel-label { color: white; font-weight: 900; font-size: 16px; text-align: center; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 0px 6px rgba(0,0,0,0.8); margin-left: -15px !important; margin-top: -10px !important; }

        /* Loader animacija */
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px;}
        .spinner-blue { border-color: rgba(52,152,219,0.2); border-top-color: #3498db; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="search-header">
        <h2>PIS Iskalnik po parcelah</h2>
        <p style="font-size: 12px; color: #bdc3c7; margin: 0 0 15px 0;">Vpiši šifro katastrske občine in številko parcele za prenos podatkov v živo.</p>
        
        <div class="input-group">
            <div class="input-field">
                <label>Šifra KO</label>
                <input type="text" id="in-ko" placeholder="Npr. 1724" value="1724">
            </div>
            <div class="input-field">
                <label>Št. parcele</label>
                <input type="text" id="in-parc" placeholder="Npr. 372/52" value="372/52">
            </div>
        </div>
        <button class="btn-search" onclick="isciParcelo()" id="btn-isci">🔍 Najdi Parcelo in Akte</button>
    </div>
    
    <div id="results-container">
        <div style="text-align:center; color:#95a5a6; margin-top:40px; font-style:italic;">
            Pritisni gumb za iskanje, da sistem preveri baze PIS in GURS.
        </div>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>
</div>

<script>
    // --- INICIALIZACIJA ZEMLJEVIDA ---
    const startLat = 46.056; const startLng = 14.505; const startZoom = 9;
    const map = L.map('map', { zoomControl: false }).setView([startLat, startLng], startZoom);
    L.control.zoom({ position: 'topright' }).addTo(map);

    const satelit = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 21, maxNativeZoom: 19 });
    satelit.addTo(map);

    let gursLayer = L.layerGroup().addTo(map);
    let labelsLayer = L.layerGroup().addTo(map);

    // --- POMOŽNE FUNKCIJE ---
    function formatirajDatum(isoDatum) {
        if (!isoDatum || isoDatum.includes("1900") || isoDatum === "0") return '<span style="color:#e74c3c;">Ni vneseno</span>';
        let parts = isoDatum.split("T")[0].split("-");
        if (parts.length === 3) return `${parts[2]}. ${parts[1]}. ${parts[0]}`;
        return isoDatum;
    }

    function varuj(txt) {
        if (!txt || txt === "null") return "/";
        return txt.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function pokaziStatus(tip, sporocilo) {
        const resCont = document.getElementById('results-container');
        let icon = tip === 'loading' ? '<div class="spinner spinner-blue"></div>' : (tip === 'error' ? '❌' : '✅');
        resCont.innerHTML = `<div class="status-msg status-${tip}">${icon} ${sporocilo}</div>`;
    }

    // Varna fetch funkcija, ki uporablja Proxy za zaobidenje CORS blokad brskalnika
    async function varjenFetch(url) {
        // Uporabljamo allorigins kot zanesljiv brezplačen proxy
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
        let res = await fetch(proxyUrl);
        if (!res.ok) throw new Error(`Proxy napaka: ${res.status}`);
        return res;
    }

    // --- GLAVNA FUNKCIJA ZA ISKANJE IN RISANJE ---
    async function isciParcelo() {
        let ko = document.getElementById('in-ko').value.trim();
        let parc = document.getElementById('in-parc').value.trim();
        let btn = document.getElementById('btn-isci');

        if (!ko || !parc) { alert("Vpiši KO in Parcelo!"); return; }

        btn.innerHTML = `Iščem... <div class="spinner"></div>`;
        btn.disabled = true;
        gursLayer.clearLayers();
        labelsLayer.clearLayers();
        pokaziStatus('loading', 'Iščem geometrijo parcele na GURS-u...');

        try {
            // 1. KORAK: PRIDOBI GEOMETRIJO IZ GURS-A (GURS običajno nima CORS blokade, a gremo vseeno preko proxyja za vsak slučaj)
            let gursFilter = `KO_SIFRA='${ko}' AND ST_PARCELE='${parc}'`; // Za WFS 2.0.0
            let gursUrl = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=2.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&cql_filter=${encodeURIComponent(gursFilter)}`;
            
            let resGurs = await varjenFetch(gursUrl);
            let dataGurs = await resGurs.json();

            // Če WFS 2.0.0 ne vrne ničesar, poskusimo s poljem KO_ID namesto KO_SIFRA (odvisno od strežnika)
            if (!dataGurs.features || dataGurs.features.length === 0) {
                let gursFilterFallback = `KO_ID=${ko} AND ST_PARCELE='${parc}'`;
                let gursUrlFallback = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=2.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&cql_filter=${encodeURIComponent(gursFilterFallback)}`;
                let resGursFallback = await varjenFetch(gursUrlFallback);
                dataGurs = await resGursFallback.json();
            }

            if (!dataGurs.features || dataGurs.features.length === 0) {
                pokaziStatus('error', 'GURS: Parcela ni najdena. Preveri številko KO in parcele.');
                btn.innerHTML = "🔍 Najdi Parcelo in Akte"; btn.disabled = false;
                return;
            }

            let parcelFeature = dataGurs.features[0];
            
            // 2. KORAK: PRIDOBI ID-JE AKTOV IZ RELACIJSKE TABELE PIS (Strogo preko Proxyja!)
            pokaziStatus('loading', 'Preverjam upravne akte (PIS)...');
            let pisFilter = `SIFKO=${ko} AND PARCELA='${parc}'`;
            let pisUrl = `https://storitve.eprostor.gov.si/ows-pub-wfs/SI.MOP.GRAD/wfs?service=WFS&version=2.0.0&request=GetFeature&typeName=SI.MOP.GRAD:UPRAVNI_AKTI_PARCELE&outputFormat=application/json&cql_filter=${encodeURIComponent(pisFilter)}`;
            
            let resPis = await varjenFetch(pisUrl);
            let dataPis = await resPis.json();

            let actIds = [];
            if (dataPis.features && dataPis.features.length > 0) {
                dataPis.features.forEach(f => {
                    if (f.properties.ID_UA) actIds.push(f.properties.ID_UA);
                });
            }
            actIds = [...new Set(actIds)]; // Odstranimo dvojnike

            // 3. KORAK: ZA VSAK AKT PRIDOBI BOGATE PODATKE IZ REST API (Preko Proxyja!)
            let actsData = [];
            let hasPzgOverall = false;

            if (actIds.length > 0) {
                pokaziStatus('loading', `Prenašam detajle za ${actIds.length} akt(ov)...`);
                for (let id of actIds) {
                    try {
                        let apiUrl = `https://pis.eprostor.gov.si/pis-ua-api/api/javno/upravni-akt/${id}`;
                        let apiRes = await varjenFetch(apiUrl);
                        let actDetail = await apiRes.json();
                        
                        let tip = (actDetail.sifVrsUaKraSif || actDetail.nazUprPos || "").toUpperCase();
                        if (tip === "GD" || tip.includes("GRADBENO")) {
                            actsData.push(actDetail);
                            let pzg = actDetail.datumPrijaveZacetkaGradnje || "";
                            if (pzg && !pzg.includes("1900") && pzg !== "0") hasPzgOverall = true;
                        }
                    } catch(e) { console.error("Napaka pri branju API za ID:", id); }
                }
            }

            // 4. KORAK: IZRISOVANJE IN BARVANJE PARCELE
            let polyColor = actsData.length > 0 ? (hasPzgOverall ? "#27ae60" : "#f39c12") : "#ffffff";
            
            let geojsonLayer = L.geoJSON(parcelFeature, {
                style: { color: polyColor, weight: 3, fillColor: polyColor, fillOpacity: actsData.length > 0 ? 0.4 : 0.0 }
            }).addTo(gursLayer);

            map.fitBounds(geojsonLayer.getBounds(), { maxZoom: 19, padding: [20, 20] });

            try {
                let center = turf.centerOfMass(parcelFeature);
                let labelIcon = L.divIcon({ className: 'parcel-label', html: parc, iconSize: [0,0] });
                L.marker([center.geometry.coordinates[1], center.geometry.coordinates[0]], {icon: labelIcon, interactive: false}).addTo(labelsLayer);
            } catch(e) {}

            // 5. KORAK: IZPIS REZULTATOV V LEVI PANEL
            let resHtml = `<h3 style="color:#2c3e50; border-bottom:2px solid #ecf0f1; padding-bottom:10px;">Rezultati za: KO ${ko}, parc. ${parc}</h3>`;
            
            if (actsData.length > 0) {
                resHtml += `<div class="status-msg status-success">✅ Najdenih gradbenih dovoljenj: ${actsData.length}</div>`;
                
                actsData.forEach((a, idx) => {
                    let stZadeve = varuj(a.stevZad);
                    let investitor = varuj(a.investitor);
                    let ccsi = varuj(a.ccsi || a.klasifikacija);
                    let vrsta = varuj(a.vrstaObjekta || a.nazivObjekta);
                    let opis = varuj(a.opis || a.opisGradnje);
                    let organ = varuj(a.nazUprOrg);
                    
                    let pzgRaw = a.datumPrijaveZacetkaGradnje || "";
                    let imaPrijavo = (pzgRaw && !pzgRaw.includes('1900') && pzgRaw !== "0");
                    let pzgDisplay = imaPrijavo ? `<span style="color:#27ae60;">${formatirajDatum(pzgRaw)} ✅</span>` : `<span style="color:#e74c3c;">❌ Ni prijave</span>`;
                    
                    let cardClass = imaPrijavo ? "gd-card has-pzg" : "gd-card";
                    let link = a.idUa ? `<a href="https://pis.eprostor.gov.si/pis-ua-jv/upravni-akt.html?id=${a.idUa}&lang=sl" target="_blank" class="btn-link">Poglej originalni akt v PIS</a>` : "";

                    resHtml += `
                    <div class="${cardClass}">
                        <h4 class="gd-card-title">Akt ${idx+1}: ${stZadeve}</h4>
                        <table class="data-table">
                            <tr><th>Upravni organ</th><td>${organ}</td></tr>
                            <tr><th>Investitor</th><td>${investitor}</td></tr>
                            <tr><th>CC-SI Klasifikacija</th><td>${ccsi}</td></tr>
                            <tr><th>Vrsta objekta</th><td>${vrsta}</td></tr>
                            <tr><th>Kratek opis</th><td>${opis}</td></tr>
                            <tr><th>Datum izdaje</th><td>${formatirajDatum(a.datIzd)}</td></tr>
                            <tr><th>Pravnomočnost</th><td>${formatirajDatum(a.maxDatPra)}</td></tr>
                            <tr><th>Prijava zač. gradnje</th><td style="font-size:14px;">${pzgDisplay}</td></tr>
                        </table>
                        ${link}
                    </div>`;
                });
            } else {
                resHtml += `<div class="status-msg status-error">⚠️ PIS sistem za to parcelo nima evidentiranih gradbenih dovoljenj.</div>`;
            }

            document.getElementById('results-container').innerHTML = resHtml;

        } catch(e) {
            console.error(e);
            pokaziStatus('error', 'Prišlo je do mrežne ali sistemske napake (CORS). Preveri internetno povezavo.');
        } finally {
            btn.innerHTML = "🔍 Najdi Parcelo in Akte";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
