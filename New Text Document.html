<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GURS GIS Pregledovalnik</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* ZDRUŽEN PLAVAJOČI MENI */
        .main-menu {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            width: 320px; transition: all 0.3s ease; overflow: hidden;
        }
        
        /* Skrit meni - samo gumb za odpiranje */
        .main-menu.collapsed { width: 45px; height: 45px; border-radius: 50%; }
        .main-menu.collapsed .menu-content { display: none; }

        /* Glava menija z gumbom za krčenje */
        .menu-header {
            display: flex; align-items: center; padding: 5px 10px;
            background: #f8f9fa; border-bottom: 1px solid #eee;
        }
        #toggle-menu-btn {
            background: none; border: none; font-size: 20px; cursor: pointer;
            padding: 5px; line-height: 1; color: #2c3e50;
        }

        /* Vsebina menija */
        .menu-content { padding: 15px; }

        /* Iskalnik znotraj menija */
        .search-row { display: flex; margin-bottom: 15px; gap: 5px; }
        #search-input { 
            flex: 1; border: 1px solid #ddd; padding: 8px 12px; 
            border-radius: 6px; outline: none; font-size: 14px;
        }
        #search-btn { 
            background: #2c3e50; color: white; border: none; 
            padding: 0 12px; border-radius: 6px; cursor: pointer; 
        }

        /* Stikala */
        .controls-section h4 { margin: 10px 0 8px 0; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .row { display: flex; align-items: center; margin-bottom: 12px; font-size: 14px; cursor: pointer; color: #333; }
        .row input { margin-right: 12px; width: 20px; height: 20px; cursor: pointer; }

        /* Stil za številke parcel */
        .parcel-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-size: 13px; font-weight: 900;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
        }

        /* Info Okno */
        #info-okno {
            position: absolute; bottom: -600px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 480px; background: white; border-radius: 12px 12px 0 0;
            box-shadow: 0px -4px 20px rgba(0,0,0,0.5); z-index: 2000; padding: 20px;
            transition: bottom 0.3s ease-in-out; border-top: 5px solid #e67e22;
        }

        .oranzen-krogec-hiska {
            background: #e67e22; color: white; border-radius: 50%; width: 32px; height: 32px;
            display: flex; justify-content: center; align-items: center; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* POVEČANA IMENA ULIC (CSS filter za večjo opaznost) */
        .street-labels-layer {
            filter: contrast(120%) brightness(110%);
            transform: scale(1.5); /* Vizualna simulacija povečave preko transformacij ni priporočljiva za tiles, 
                                      zato bomo uporabili zoom offset v JS */
        }
    </style>
</head>
<body>

    <div id="main-menu" class="main-menu">
        <div class="menu-header">
            <button id="toggle-menu-btn" onclick="toggleMenu()">☰</button>
            <span style="margin-left: 10px; font-weight: bold; font-size: 14px; color: #2c3e50;" id="menu-title">Nastavitve & Iskanje</span>
        </div>
        
        <div class="menu-content">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Naslov ali kraj...">
                <button id="search-btn" onclick="isciNaslov()">🔍</button>
            </div>

            <div class="controls-section">
                <h4>Sloji</h4>
                <label class="row"><input type="checkbox" id="check-labels" checked onchange="toggleLabels()"> 🛣️ Imena ulic (Večja)</label>
                <label class="row"><input type="checkbox" id="check-parcele" checked onchange="naloziParcele()"> 📐 Zemljiške parcele</label>
                
                <h4>Orodja</h4>
                <label class="row"><input type="checkbox" id="check-podatki" checked onchange="togglePodatki()"> 🏠 Moji podatki (CSV)</label>
                <label class="row"><input type="checkbox" id="check-lokacija" onchange="toggleGeolokacija()"> 📍 Moja lokacija</label>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="info-okno">
        <span style="float:right; cursor:pointer; font-weight:bold; color:#e74c3c;" onclick="zapriInfoOkno()">[ZAPRI X]</span>
        <h3 id="info-naslov">Naslov</h3>
        <div id="info-vsebina">Vsebina...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // PODLAGE
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 20, 
            attribution: 'Esri' 
        });

        // POVEČANA IMENA ULIC: Uporabimo zoomOffset in tileSize za faktor 1.5x
        // Opomba: Ker tile serverji niso narejeni za poljubne faktorje, je najboljša aproksimacija 
        // uporaba večjih ploščic (tiles) na nižjem zoomu.
        const streetLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { 
            zIndex: 1000, 
            attribution: 'CartoDB',
            zoomOffset: -1, // To bo "povečalo" napise, ker bo vzelo napise prejšnjega zooma
            tileSize: 512,  // Podvojena velikost ploščic vizualno poveča vsebino
            opacity: 1
        });

        const map = L.map('map', { zoomControl: false }).setView([46.1, 14.8], 9);
        satellite.addTo(map);
        streetLabels.addTo(map);

        let markerGroup = L.layerGroup().addTo(map);
        let parceleLayer = L.layerGroup().addTo(map);
        let userMarker = null;
        let wfsTimeout = null;

        // MENI FUNKCIJE
        function toggleMenu() {
            const menu = document.getElementById('main-menu');
            const title = document.getElementById('menu-title');
            menu.classList.toggle('collapsed');
            title.style.display = menu.classList.contains('collapsed') ? 'none' : 'inline';
        }

        // ISKANJE Z ENTER
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') isciNaslov(); });

        function toggleLabels() {
            document.getElementById('check-labels').checked ? streetLabels.addTo(map) : map.removeLayer(streetLabels);
        }

        // CSV PODATKI
        function naloziPodatke() {
            Papa.parse('podatki.csv', {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    markerGroup.clearLayers();
                    res.data.forEach(v => {
                        const kKey = Object.keys(v).find(k => k.toLowerCase().includes('koordinate'));
                        if (!v[kKey]) return;
                        const coords = v[kKey].split(',').map(n => parseFloat(n.trim()));
                        const icon = L.divIcon({ className: '', html: '<div class="oranzen-krogec-hiska">🏠</div>', iconSize: [32, 32] });
                        const m = L.marker([coords[0], coords[1]], {icon: icon});
                        let info = "";
                        for (let k in v) if (v[k] && k !== kKey) info += `<p><b>${k}:</b> ${v[k]}</p>`;
                        m.on('click', () => {
                            document.getElementById("info-naslov").innerText = v['Naziv'] || "Podatki";
                            document.getElementById("info-vsebina").innerHTML = info;
                            document.getElementById("info-okno").style.bottom = "0";
                            if (window.innerWidth < 600) toggleMenu(); // Skrij meni na mobilcih ob kliku
                        });
                        markerGroup.addLayer(m);
                    });
                }
            });
        }
        naloziPodatke();
        
        function togglePodatki() { document.getElementById('check-podatki').checked ? map.addLayer(markerGroup) : map.removeLayer(markerGroup); }

        // PARCELE (Zoom 19+)
        function naloziParcele() {
            if (!document.getElementById('check-parcele').checked || map.getZoom() < 19) { 
                parceleLayer.clearLayers(); 
                return; 
            }
            const b = map.getBounds();
            const url = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&srsName=EPSG:4326&bbox=${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()},EPSG:4326`;

            fetch(url).then(r => r.json()).then(data => {
                parceleLayer.clearLayers();
                L.geoJSON(data, {
                    style: { color: "white", weight: 1.5, fill: false },
                    onEachFeature: (f, l) => {
                        const st = f.properties.ST_PARCELE || f.properties.st_parcele;
                        if (st) l.bindTooltip(String(st), { permanent: true, direction: 'center', className: 'parcel-tooltip' });
                    }
                }).addTo(parceleLayer);
            });
        }

        map.on('moveend', () => {
            clearTimeout(wfsTimeout);
            wfsTimeout = setTimeout(naloziParcele, 400);
        });

        // GEOLOKACIJA
        function toggleGeolokacija() {
            if (document.getElementById('check-lokacija').checked) {
                navigator.geolocation.getCurrentPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if (userMarker) userMarker.setLatLng(pos);
                    else userMarker = L.circleMarker(pos, {radius: 9, color: 'white', fillColor: '#3498db', fillOpacity: 1, weight: 3}).addTo(map);
                    map.setView(pos, 19);
                    if (window.innerWidth < 600) toggleMenu();
                }, err => { alert("Lokacija ni na voljo."); document.getElementById('check-lokacija').checked = false; }, {enableHighAccuracy: true});
            } else if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
        }

        // ISKALNIK
        async function isciNaslov() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=si`);
                const data = await res.json();
                if (data.length > 0) {
                    map.setView([data[0].lat, data[0].lon], 19);
                    if (window.innerWidth < 600) toggleMenu();
                } else alert("Ni zadetkov.");
            } catch (err) { alert("Napaka pri iskanju."); }
        }

        function zapriInfoOkno() { document.getElementById("info-okno").style.bottom = "-600px"; }
    </script>
</body>
</html>
