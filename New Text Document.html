<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GURS GIS Pregledovalnik v4 - Optimiziran</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Meni */
        .main-menu {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 300px; transition: 0.3s; overflow: hidden;
        }
        .main-menu.collapsed { width: 45px; height: 45px; border-radius: 50%; }
        .main-menu.collapsed .menu-content { display: none; }
        .menu-header { display: flex; align-items: center; padding: 5px 10px; background: #f8f9fa; border-bottom: 1px solid #eee; cursor: pointer; }
        #toggle-menu-btn { background: none; border: none; font-size: 24px; color: #2c3e50; }
        
        .menu-content { padding: 15px; }
        .search-row { display: flex; margin-bottom: 12px; gap: 5px; }
        #search-input { flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 6px; outline: none; }
        #search-btn { background: #2c3e50; color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; }

        .row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; cursor: pointer; }
        .row input { margin-right: 10px; width: 18px; height: 18px; }

        /* Stil za številke parcel */
        .parcel-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-size: 12px; font-weight: 900;
            text-shadow: -1.2px -1.2px 0 #000, 1.2px -1.2px 0 #000, -1.2px 1.2px 0 #000, 1.2px 1.2px 0 #000;
            pointer-events: none !important; 
        }

        /* Info Okno */
        #info-okno {
            position: absolute; bottom: -600px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; background: white; border-radius: 15px 15px 0 0;
            box-shadow: 0px -5px 25px rgba(0,0,0,0.4); z-index: 2000; padding: 20px;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-top: 6px solid #e67e22;
        }
        .mini-podatek { margin: 10px 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        .mini-label { color: #999; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .mini-val { color: #333; font-size: 15px; font-weight: 600; display: block; margin-top: 2px;}
    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <div id="main-menu" class="main-menu">
        <div class="menu-header" onclick="toggleMenu()">
            <button id="toggle-menu-btn">☰</button>
            <span style="font-size:14px; font-weight:bold; margin-left:10px;">GURS Pregledovalnik v4</span>
        </div>
        <div class="menu-content">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Vpiši naslov...">
                <button id="search-btn" onclick="isciNaslov()">🔍</button>
            </div>
            <label class="row"><input type="checkbox" id="check-parcele" checked onchange="naloziParcele()"> 📐 Zemljiške parcele</label>
            <label class="row"><input type="checkbox" id="check-labels" checked onchange="toggleLabels()"> 🛣️ Imena ulic (Večja)</label>
            <label class="row"><input type="checkbox" id="check-lokacija" onchange="toggleGeolokacija()"> 📍 Moja lokacija</label>
            <label class="row"><input type="checkbox" id="check-mojetocke" checked onchange="toggleMojeTocke()"> 📌 Moje točke</label>
        </div>
    </div>

    <div id="map"></div>

    <div id="info-okno">
        <span style="float:right; cursor:pointer; font-weight:bold; color:#999;" onclick="zapriInfoOkno()">ZAPRI [X]</span>
        <h3 id="info-naslov" style="margin-top:0; color:#e67e22;">Parcela</h3>
        <div id="info-vsebina">Nalagam podatke... ⏳</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 });
        const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { zIndex: 1000, zoomOffset: -1, tileSize: 512 });

        const map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([46.05, 14.5], 13);
        satellite.addTo(map);
        labels.addTo(map);

        let parceleLayer = L.layerGroup().addTo(map);
        let userMarker = null;
        
        let mapMoveTimeout = null;
        let fetchAbortController = null;

        function toggleMenu() { document.getElementById('main-menu').classList.toggle('collapsed'); }
        function zapriInfoOkno() { document.getElementById("info-okno").style.bottom = "-600px"; }
        function toggleLabels() { document.getElementById('check-labels').checked ? labels.addTo(map) : map.removeLayer(labels); }

        // --- SKRIPTA ZA GENERIRANJE ZK PDF ---
        function odpriZK(koSifra, stParcele) {
            if (!koSifra || !stParcele || koSifra === '-' || stParcele === '-') {
                alert("Podatki o KO ali parceli manjkajo!");
                return;
            }

            // Očistimo številko parcele (če vsebuje ime KO spredaj, npr. "2010 1508/5", vzamemo samo drugi del)
            let cistaParcela = stParcele.toString().trim();
            if (cistaParcela.includes(' ')) {
                cistaParcela = cistaParcela.split(' ').pop();
            }

            // Dinamično ustvarimo skrito formo in jo pošljemo (POST) v novem zavihku
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://evlozisce.sodisce.si/evlozisce/javni_izpisi/03-001.html';
            form.target = '_blank'; // Odpre v novem zavihku

            const params = {
                'nacinList': 'IDZNAK',
                'tipNepList.nobind': '1',
                'idZnakNep.katastrskaObcina.idsrcsifrant': koSifra.toString().trim(),
                'idZnakNep.parcelnaStevilkaNovo': cistaParcela,
                '_eventId_pdf': 'Prikaži v pdf obliki'
            };

            for (const key in params) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = params[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        async function fetchGursData(latlng, stParcele) {
            document.getElementById("info-naslov").innerText = "... " + stParcele; 
            document.getElementById("info-vsebina").innerHTML = "Povezujem se z državnimi registri... ⏳";
            document.getElementById("info-okno").style.bottom = "0";

            const buffer = 0.00001; 
            const bbox = `${latlng.lng-buffer},${latlng.lat-buffer},${latlng.lng+buffer},${latlng.lat+buffer}`;
            
            const rpeBase = `https://ipi.eprostor.gov.si/wfs-si-gurs-rpe/wfs?service=WFS&version=1.1.0&request=GetFeature&outputFormat=application/json&srsName=EPSG:4326&bbox=${bbox},EPSG:4326`;
            const knBase = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn-osnovni/wfs?service=WFS&version=1.1.0&request=GetFeature&outputFormat=application/json&srsName=EPSG:4326&bbox=${bbox},EPSG:4326`;

            try {
                const [resKO, resObc, resUE] = await Promise.allSettled([
                    fetch(knBase + "&typeName=KATASTRSKE_OBCINE_TABELA").then(r => r.json()),
                    fetch(rpeBase + "&typeName=SI.GURS.RPE:OBCINE").then(r => r.json()),
                    fetch(rpeBase + "&typeName=SI.GURS.RPE:UPRAVNE_ENOTE").then(r => r.json())
                ]);

                const extractName = (settledRes) => {
                    if (settledRes.status === "fulfilled" && settledRes.value.features?.length > 0) {
                        const props = settledRes.value.features[0].properties;
                        return props.UIME || props.IME || props.NAZIV || props.NAZIV_KO || 
                               Object.values(props).find(v => typeof v === 'string' && v.length > 2) || "Ni najdeno";
                    }
                    return "Ni najdeno";
                };

                const extractCode = (settledRes) => {
                    if (settledRes.status === "fulfilled" && settledRes.value.features?.length > 0) {
                        const props = settledRes.value.features[0].properties;
                        return props.SIFRA || props.KO_SIFRA || props.sifra || props.KO_ID || "----";
                    }
                    return "----";
                };

                const koIme = extractName(resKO);
                const koSifra = extractCode(resKO);
                const obcina = extractName(resObc);
                const ue = extractName(resUE);

                document.getElementById("info-naslov").innerText = koSifra + " " + stParcele;

                // Dodan gumb za ZK tudi v glavno okno parcele
                const zkButton = koSifra !== "----" ? `<button onclick="odpriZK('${koSifra}', '${stParcele}')" style="margin-top: 15px; padding: 10px; background: #c0392b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">📄 Prenesi ZK izpisek (PDF)</button>` : '';

                document.getElementById("info-vsebina").innerHTML = `
                    <div class="mini-podatek"><span class="mini-label">Katastrska občina</span><span class="mini-val">${koIme}</span></div>
                    <div class="mini-podatek"><span class="mini-label">Občina</span><span class="mini-val">${obcina}</span></div>
                    <div class="mini-podatek"><span class="mini-label">Upravna enota</span><span class="mini-val">${ue}</span></div>
                    ${zkButton}
                    <div style="margin-top:10px; font-size:10px; color:#ccc; text-align:center;">Vir podatkov: GURS e-prostor</div>
                `;
            } catch (err) {
                document.getElementById("info-vsebina").innerHTML = "Težava pri komunikaciji z GURS strežnikom.";
                document.getElementById("info-naslov").innerText = "Napaka " + stParcele;
            }
        }

        function naloziParcele() {
            if (!document.getElementById('check-parcele').checked || map.getZoom() < 18) {
                parceleLayer.clearLayers(); 
                if (fetchAbortController) fetchAbortController.abort();
                return;
            }

            if (fetchAbortController) fetchAbortController.abort();
            fetchAbortController = new AbortController();

            const b = map.getBounds();
            const url = `https://ipi.eprostor.gov.si/wfs-si-gurs-kn/wfs?service=WFS&version=1.0.0&request=GetFeature&typeName=SI.GURS.KN:PARCELE&outputFormat=application/json&srsName=EPSG:4326&bbox=${b.getWest()},${b.getSouth()},${b.getEast()},${b.getNorth()},EPSG:4326`;

            fetch(url, { signal: fetchAbortController.signal })
                .then(r => r.json())
                .then(data => {
                    parceleLayer.clearLayers();
                    L.geoJSON(data, {
                        style: { color: "white", weight: 1.2, fillOpacity: 0 },
                        onEachFeature: (f, l) => {
                            const st = f.properties.ST_PARCELE || f.properties.st_parcele;
                            l.bindTooltip(String(st), { permanent: true, className: 'parcel-tooltip', direction: 'center' });
                            l.on('click', (e) => { 
                                L.DomEvent.stopPropagation(e);
                                fetchGursData(e.latlng, st); 
                            });
                        }
                    }).addTo(parceleLayer);
                })
                .catch(err => {
                    if (err.name !== 'AbortError') console.error("WFS Napaka:", err); 
                });
        }

        map.on('moveend', () => {
            clearTimeout(mapMoveTimeout);
            mapMoveTimeout = setTimeout(naloziParcele, 300);
        });

        function toggleGeolokacija() {
            if (document.getElementById('check-lokacija').checked) {
                map.locate({setView: true, maxZoom: 19, enableHighAccuracy: true});
                map.on('locationfound', e => {
                    if (userMarker) userMarker.setLatLng(e.latlng);
                    else userMarker = L.circleMarker(e.latlng, {radius: 8, color: 'white', fillColor: '#3498db', fillOpacity: 1, weight: 2}).addTo(map);
                });
            } else { map.stopLocate(); if(userMarker) map.removeLayer(userMarker); userMarker = null; }
        }

        async function isciNaslov() {
            const q = document.getElementById('search-input').value;
            if (!q) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=si`);
            const data = await res.json();
            if (data.length > 0) map.setView([data[0].lat, data[0].lon], 19);
        }

        // --- MOJE TOČKE (GOOGLE SHEETS LAYER) ---
        let mojeTockeLayer = L.layerGroup().addTo(map);
        
        const googleSheetsCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQGHIoNVspAhEHLg6i8jt7iXdY1dxiEOWkU1VMiUkkWAlOf42eTGR0KQmKDv16XG8nNOMNyrw_VkHwU/pub?gid=929707322&single=true&output=csv";

        function naloziMojeTocke() {
            mojeTockeLayer.clearLayers(); 

            Papa.parse(googleSheetsCsvUrl, {
                download: true,
                header: true, 
                skipEmptyLines: true, 
                complete: function(results) {
                    results.data.forEach(row => {
                        const koordinateStr = row['Koordinate Google maps'];
                        
                        if (koordinateStr && koordinateStr.includes(',')) {
                            const parts = koordinateStr.split(',');
                            const lat = parseFloat(parts[0].trim()); 
                            const lng = parseFloat(parts[1].trim());
                            
                            if (!isNaN(lat) && !isNaN(lng)) {
                                
                                const postopek = row['Postopek'] || 'Brez postopka';
                                const naziv = row['Naziv'] || 'Neznan naziv';
                                const idUa = row['ID UA'] || '-';
                                const upravniOrgan = row['Upravni organ'] || '-';
                                const obcina = row['Občina'] || '-';
                                const investitor = row['Investitorji'] || '-';
                                const stZadeve = row['Št. zadeve'] || '-';
                                const datumIzd = row['Datum izd.'] || '-';
                                const datPrav = row['Dat. prav.'] || '-';
                                const zacetekGradnje = row['Datum prij. zač. grad.'] || '-';
                                const status = row['Način rešitve'] || '-';
                                const imeKo = row['Ime KO'] || '-';
                                const sifraKo = row['Šifra KO'] || '-';
                                const parcelaInfo = row['KO + parcela'] || '-';
                                
                                const pisLink = row['PIS'] ? `<a href="${row['PIS']}" target="_blank" style="display:inline-block; margin-top:5px; padding: 4px 8px; background: #3498db; color: white; border-radius: 4px; text-decoration:none; font-size: 11px;">🔗 PIS</a>` : '';
                                const fotoLink = row['FOTO'] ? `<a href="${row['FOTO']}" target="_blank" style="display:inline-block; margin-top:5px; padding: 4px 8px; background: #2ecc71; color: white; border-radius: 4px; text-decoration:none; font-size: 11px;">📷 FOTO</a>` : '';
                                const iobcinaLink = row['iobcina'] ? `<a href="${row['iobcina']}" target="_blank" style="display:inline-block; margin-top:5px; padding: 4px 8px; background: #9b59b6; color: white; border-radius: 4px; text-decoration:none; font-size: 11px;">🗺️ iObčina</a>` : '';
                                
                                // DODAN ZK GUMB
                                const zkLink = (sifraKo !== '-' && parcelaInfo !== '-') ? `<a href="#" onclick="odpriZK('${sifraKo}', '${parcelaInfo}'); return false;" style="display:inline-block; margin-top:5px; padding: 4px 8px; background: #c0392b; color: white; border-radius: 4px; text-decoration:none; font-size: 11px;">📄 ZK</a>` : '';
                                
                                const obiskanoText = (row['obiskano'] && row['obiskano'].toLowerCase().trim() === 'da') 
                                    ? '<span style="color: #27ae60; font-weight: bold;">✓ Obiskano</span>' 
                                    : '<span style="color: #e74c3c; font-weight: bold;">✗ Še ni obiskano</span>';

                                const marker = L.marker([lat, lng]);
                                
                                const popupVsebina = `
                                    <div style="min-width: 290px; font-family: 'Segoe UI', sans-serif;">
                                        <div style="font-size: 10px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px;">${postopek} | ID: ${idUa}</div>
                                        <h4 style="margin:2px 0 8px 0; color:#2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; font-size: 13px;">${naziv}</h4>
                                        
                                        <table style="width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 10px;">
                                            <tr><td style="padding: 2px 0; color: #7f8c8d; width: 100px;">Upravni organ:</td><td style="font-weight: 500;">${upravniOrgan}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Občina:</td><td style="font-weight: 500;">${obcina}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Investitor:</td><td style="font-weight: 500;">${investitor}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Št. zadeve:</td><td style="font-weight: 500;">${stZadeve}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Datum izdaje:</td><td style="font-weight: 500;">${datumIzd}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Pravnomočnost:</td><td style="font-weight: 500;">${datPrav}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Začetek gradnje:</td><td style="font-weight: 500;">${zacetekGradnje}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Način rešitve:</td><td style="font-weight: 500;">${status}</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Katastrska občina:</td><td style="font-weight: 500;">${imeKo} (${sifraKo})</td></tr>
                                            <tr><td style="padding: 2px 0; color: #7f8c8d;">Parcela:</td><td style="font-weight: 500;">${parcelaInfo}</td></tr>
                                        </table>
                                        
                                        <div style="margin-top: 5px; font-size: 12px; border-top: 1px solid #eee; padding-top: 8px;">
                                            ${obiskanoText}
                                        </div>
                                        
                                        <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                                            ${pisLink}
                                            ${fotoLink}
                                            ${iobcinaLink}
                                            ${zkLink}
                                        </div>
                                    </div>
                                `;
                                
                                marker.bindPopup(popupVsebina);
                                marker.addTo(mojeTockeLayer);
                            }
                        }
                    });
                },
                error: function(error) {
                    console.error("Napaka pri branju Google Sheets CSV:", error);
                }
            });
        }

        function toggleMojeTocke() {
            if (document.getElementById('check-mojetocke').checked) {
                map.addLayer(mojeTockeLayer);
                naloziMojeTocke(); 
            } else {
                map.removeLayer(mojeTockeLayer);
            }
        }

        // Klic ob zagonu
        naloziMojeTocke();
    </script>
</body>
</html>
